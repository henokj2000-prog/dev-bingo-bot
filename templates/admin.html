<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Panel</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            padding: 20px;
        }
        h1 {
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 1rem;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #1d4ed8;
        }
        button.danger {
            background: #dc2626;
        }
        button.danger:hover {
            background: #b91c1c;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }
        th, td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        th {
            background: #f9fafb;
            font-weight: 600;
            color: #1f2937;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge.approved {
            background: #d1fae5;
            color: #065f46;
        }
        .badge.banned {
            background: #fee2e2;
            color: #991b1b;
        }
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.open {
            display: flex;
        }
        .modal-content {
            background: white;
            max-width: 400px;
            width: 90%;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 1rem;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            font-size: 1rem;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .info-text {
            font-size: 0.85rem;
            color: #4b5563;
            margin-top: -8px;
            margin-bottom: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        @media (max-width: 700px) {
            th, td { padding: 10px 8px; font-size: 0.85rem; }
            button { padding: 6px 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <h1>👥 Player Management</h1>
        <button id="openBonusBtn">➕ Give Bonus by Phone</button>
    </div>
    <div id="playersTableContainer">
        <div class="loading">Loading players...</div>
    </div>
</div>

<!-- Bonus Modal -->
<div id="bonusModal" class="modal">
    <div class="modal-content">
        <h3>🎁 Give Bonus</h3>
        <label>Phone number</label>
        <input type="tel" id="bonusPhone" placeholder="e.g., 2519xxxxxxxx" autocomplete="off">
        <button id="fetchUserBtn">🔍 Fetch User</button>
        <div class="info-text" id="bonusUserInfo"></div>

        <label>Amount (ETB)</label>
        <input type="number" id="bonusAmount" placeholder="0.00" step="0.01">

        <label>Reason</label>
        <textarea id="bonusReason" rows="2" placeholder="Bonus reason..."></textarea>

        <div class="modal-buttons">
            <button id="closeModalBtn" style="background:#9ca3af;">Cancel</button>
            <button id="submitBonusBtn">💸 Send Bonus</button>
        </div>
    </div>
</div>

<script>
    // ------------------- CONFIGURATION -------------------
    // Replace these URLs with your actual backend endpoints
    const API_BASE = ''; // e.g., '' if same origin, or 'https://api.example.com'
    const ENDPOINTS = {
        getPlayers: '/admin/players',          // expects { players: [...] }
        banPlayer: '/admin/ban_player',        // POST { userId, ban }
        getUserByPhone: '/admin/api/get_user_by_phone', // POST { phone }
        giveBonus: '/admin/give_bonus'         // POST { userId, amount, reason }
    };

    // Helper: authenticated fetch (add your token/cookie logic if needed)
    async function adminFetch(url, method, body = null) {
        const options = {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                // If you use session/cookie auth, include credentials
            },
            credentials: 'same-origin'  // Important for cookie-based auth
        };
        if (body) {
            options.body = JSON.stringify(body);
        }
        try {
            const response = await fetch(url, options);
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }
            return await response.json();
        } catch (err) {
            console.error('adminFetch error:', err);
            return { success: false, error: err.message };
        }
    }

    // ------------------- GLOBAL STATE -------------------
    let currentBonusUserId = null;   // stores user_id after phone fetch

    // ------------------- LOAD PLAYERS -------------------
    async function loadPlayers() {
        const container = document.getElementById('playersTableContainer');
        container.innerHTML = '<div class="loading">Loading players...</div>';
        try {
            const res = await adminFetch(ENDPOINTS.getPlayers, 'GET');
            if (res && res.players && Array.isArray(res.players)) {
                renderPlayersTable(res.players);
            } else if (res && res.success && Array.isArray(res.data)) {
                // fallback if your API returns { success: true, data: [...] }
                renderPlayersTable(res.data);
            } else {
                container.innerHTML = `<div class="loading">⚠️ Failed to load players: ${res?.error || 'Invalid response'}</div>`;
            }
        } catch (err) {
            container.innerHTML = `<div class="loading">❌ Network error: ${err.message}</div>`;
        }
    }

    function renderPlayersTable(players) {
        if (!players.length) {
            document.getElementById('playersTableContainer').innerHTML = '<div class="loading">No players found.</div>';
            return;
        }

        const tableHtml = `
            <table>
                <thead>
                    <tr><th>User ID</th><th>Wins</th><th>Total Won (ETB)</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody>
                    ${players.map(p => `
                        <tr>
                            <td>${escapeHtml(p.user_id || p.userId || '—')}</td>
                            <td>${p.wins ?? 0}</td>
                            <td>${((p.total_won ?? p.totalWon ?? 0)).toFixed(0)}</td>
                            <td><span class="badge ${p.is_banned ? 'banned' : 'approved'}">${p.is_banned ? 'Banned' : 'Approved'}</span></td>
                            <td><button class="ban-btn" data-userid="${escapeHtml(p.user_id || p.userId)}" data-ban="${!p.is_banned}">${p.is_banned ? 'Unban' : 'Ban'}</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
        const container = document.getElementById('playersTableContainer');
        container.innerHTML = tableHtml;

        // Attach event listeners to ban/unban buttons
        document.querySelectorAll('.ban-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                const userId = btn.getAttribute('data-userid');
                const ban = btn.getAttribute('data-ban') === 'true';
                await banPlayer(userId, ban);
            });
        });
    }

    // helper to prevent XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ------------------- BAN / UNBAN -------------------
    async function banPlayer(userId, ban) {
        const action = ban ? 'ban' : 'unban';
        if (!confirm(`Are you sure to ${action} player ${userId}?`)) return;

        const res = await adminFetch(ENDPOINTS.banPlayer, 'POST', { userId, ban });
        if (res && res.success) {
            alert(`Player ${userId} ${action}ned successfully.`);
            await loadPlayers();   // refresh list
        } else {
            alert(`Failed to ${action} player: ${res?.error || 'Unknown error'}`);
        }
    }

    // ------------------- BONUS MODAL LOGIC -------------------
    function openBonusModal() {
        // Reset fields
        document.getElementById('bonusPhone').value = '';
        document.getElementById('bonusAmount').value = '';
        document.getElementById('bonusReason').value = '';
        document.getElementById('bonusUserInfo').innerHTML = '';
        currentBonusUserId = null;
        document.getElementById('bonusModal').classList.add('open');
    }

    function closeBonusModal() {
        document.getElementById('bonusModal').classList.remove('open');
        currentBonusUserId = null;
    }

    async function fetchUserByPhone() {
        const phone = document.getElementById('bonusPhone').value.trim();
        if (!phone) {
            alert('Please enter a phone number.');
            return;
        }
        const infoDiv = document.getElementById('bonusUserInfo');
        infoDiv.innerHTML = '⏳ Searching...';
        const res = await adminFetch(ENDPOINTS.getUserByPhone, 'POST', { phone });
        if (res && res.user_id) {
            currentBonusUserId = res.user_id;
            infoDiv.innerHTML = `✅ User found: <strong>${escapeHtml(res.user_id)}</strong> ${res.name ? `(${escapeHtml(res.name)})` : ''}`;
        } else {
            currentBonusUserId = null;
            infoDiv.innerHTML = `❌ ${res?.error || 'User not found'}`;
        }
    }

    async function submitBonus() {
        if (!currentBonusUserId) {
            alert('Please fetch a valid user first using phone number.');
            return;
        }
        const amount = parseFloat(document.getElementById('bonusAmount').value.trim());
        const reason = document.getElementById('bonusReason').value.trim();
        if (isNaN(amount) || amount <= 0) {
            alert('Please enter a valid positive amount.');
            return;
        }
        if (!reason) {
            alert('Please provide a reason for the bonus.');
            return;
        }

        const res = await adminFetch(ENDPOINTS.giveBonus, 'POST', {
            userId: currentBonusUserId,
            amount: amount,
            reason: reason
        });

        if (res && res.success) {
            alert(`✅ Bonus of ${amount} ETB sent to ${currentBonusUserId}.`);
            closeBonusModal();
            await loadPlayers();  // refresh total_won for that player
        } else {
            alert(`❌ Failed to give bonus: ${res?.error || 'Server error'}`);
        }
    }

    // ------------------- INITIALIZATION & EVENT LISTENERS -------------------
    document.addEventListener('DOMContentLoaded', () => {
        loadPlayers();

        // Button listeners
        document.getElementById('openBonusBtn').addEventListener('click', openBonusModal);
        document.getElementById('fetchUserBtn').addEventListener('click', fetchUserByPhone);
        document.getElementById('submitBonusBtn').addEventListener('click', submitBonus);
        document.getElementById('closeModalBtn').addEventListener('click', closeBonusModal);

        // Optional: close modal when clicking outside
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('bonusModal');
            if (e.target === modal) closeBonusModal();
        });
    });
</script>
</body>
</html>
